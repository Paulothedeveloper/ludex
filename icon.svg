<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0.18" y1="0.02" x2="0.82" y2="1">
      <stop offset="0" stop-color="#7A41C6"/>
      <stop offset="0.45" stop-color="#43205F"/>
      <stop offset="1" stop-color="#160726"/>
    </linearGradient>
    <radialGradient id="sheen" cx="0.3" cy="0.12" r="0.65">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.16"/>
      <stop offset="0.55" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="amberGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0.35" stop-color="#FCB917" stop-opacity="0.7"/>
      <stop offset="1" stop-color="#FCB917" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="14" stdDeviation="22" flood-color="#0a0418" flood-opacity="0.45"/>
    </filter>
  </defs>
  <!-- squircle -->
  <rect x="64" y="64" width="896" height="896" rx="232" fill="url(#bg)" filter="url(#soft)"/>
  <rect x="64" y="64" width="896" height="896" rx="232" fill="url(#sheen)"/>
  <!-- L (branco geométrico): haste + pé, canto = pixel âmbar -->
  <g fill="#ffffff">
    <rect x="406" y="312" width="96" height="264"/>           <!-- haste (até o canto) -->
    <rect x="502" y="576" width="206" height="96"/>           <!-- pé (a partir do canto) -->
  </g>
  <!-- canto inferior-esquerdo do L = power pixel âmbar (com glow) -->
  <circle cx="454" cy="624" r="82" fill="url(#amberGlow)"/>
  <rect x="406" y="576" width="96" height="96" rx="8" fill="#FCB917"/>
</svg>
